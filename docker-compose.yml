services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: requestbin
      POSTGRES_USER: requestbin
      POSTGRES_PASSWORD: requestbin
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requestbin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://requestbin:requestbin@db:5432/requestbin?sslmode=disable
      PORT: "8080"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
