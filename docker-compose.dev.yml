services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: requestbin
      POSTGRES_USER: requestbin
      POSTGRES_PASSWORD: requestbin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U requestbin"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    environment:
      DATABASE_URL: postgres://requestbin:requestbin@db:5432/requestbin?sslmode=disable
      PORT: "8080"
    volumes:
      - ./backend:/app
      - go_mod_cache:/go/pkg/mod
      - go_build_cache:/root/.cache/go-build
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    environment:
      BACKEND_URL: http://backend:8080
    volumes:
      - ./frontend:/app
      - node_modules:/app/node_modules
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
  go_mod_cache:
  go_build_cache:
  node_modules:
